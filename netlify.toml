[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Astro çıkışı zaten dizin biçiminde (/hizmetler/ → /hizmetler/index.html)
# Netlify varsayılan pretty-URL davranışını korur.

# Custom 404 sayfası
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Yönetim paneli için tarayıcı önbelleklemesini azalt — config değişikliğinde
# hemen yansısın diye
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    X-Robots-Tag = "noindex, nofollow"
